# Nome do workflow que aparecerá na aba "Actions" do GitHub
name: CI/CD Api pagamentos

# Define quando este workflow será executado
on:
  # Executa o workflow sempre que houver um push no repositório
  push:
    # Define em quais branches o workflow será disparado
    branches:
      # Executa somente quando o push for feito na branch main
      - main

# Define os jobs que serão executados pelo workflow
jobs:

  # Nome do job responsável por:
  # 1. Baixar o código do repositório
  # 2. Fazer login no Docker Hub
  # 3. Gerar a imagem Docker multi-arquitetura
  # 4. Enviar a imagem para o Docker Hub
  # 5. Conectar no Kubernetes
  # 6. Atualizar o Deployment
  build-and-deploy:

    # Define que o job será executado em uma máquina virtual Ubuntu
    runs-on: ubuntu-latest

    # Lista de etapas executadas dentro do job
    steps:

      # Etapa responsável por baixar o código-fonte do repositório
      # para dentro da máquina virtual do GitHub Actions
      - name: Checkout código
        uses: actions/checkout@v3

      # Etapa responsável por autenticar no Docker Hub
      # usando usuário e senha/token configurados nos Secrets do GitHub
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          # Usuário do Docker Hub armazenado em:
          # Settings > Secrets and variables > Actions
          username: ${{ secrets.DOCKER_USERNAME }}

          # Senha ou token do Docker Hub armazenado nos Secrets do GitHub
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Etapa responsável por configurar o Docker Buildx
      # O Buildx permite gerar imagens para múltiplas arquiteturas,
      # como AMD64 e ARM64
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Etapa responsável por construir e enviar a imagem Docker
      # diretamente para o Docker Hub
      - name: Build e Push imagem multi-arquitetura
        uses: docker/build-push-action@v6
        with:
          # Define o diretório onde está o Dockerfile
          # O ponto "." indica a raiz do projeto
          context: .

          # Define que a imagem será enviada para o Docker Hub
          # após ser construída
          push: true

          # Define as arquiteturas suportadas pela imagem
          # linux/amd64: compatível com processadores Intel/AMD
          # linux/arm64: compatível com processadores ARM, comum em alguns clusters AKS
          platforms: linux/amd64,linux/arm64

          # Define o nome e a versão da imagem Docker
          # github.run_number gera uma versão automática a cada execução
          # Exemplo: v1, v2, v3, v4...
          tags: sergiocoti/api-pagamentos:v${{ github.run_number }}

      # Etapa responsável por configurar o acesso ao cluster Kubernetes
      # O kubeconfig deve estar salvo no Secret KUBE_CONFIG do GitHub
      - name: Configurar kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      # Etapa responsável por atualizar a imagem usada pelo Deployment no Kubernetes
      - name: Atualizar deployment
        run: |
          kubectl set image deployment/api-pagamentos api-pagamentos=sergiocoti/api-pagamentos:v${{ github.run_number }}